version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: college_erp_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-college_erp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp_network

  redis:
    image: redis:7-alpine
    container_name: college_erp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - erp_network

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: college_erp_backend
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-college_erp}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretjwt}
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    networks:
      - erp_network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: college_erp_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - erp_network

volumes:
  postgres_data:
  redis_data:

networks:
  erp_network:
    driver: bridge
