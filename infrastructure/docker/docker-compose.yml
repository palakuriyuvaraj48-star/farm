version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: krishiai_user
      POSTGRES_PASSWORD: krishiai_password
      POSTGRES_DB: krishiai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krishiai_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/krishiai
      SPRING_DATASOURCE_USERNAME: krishiai_user
      SPRING_DATASOURCE_PASSWORD: krishiai_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai-service:5000
      JWT_SECRET: krishiai-development-jwt-secret-key-2026-please-change
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  ai-service:
    build:
      context: ../../ai-models
      dockerfile: Dockerfile
    environment:
      PORT: 5000
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"

volumes:
  postgres_data:
  redis_data:
