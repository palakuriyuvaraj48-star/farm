version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: krishiai-postgres
    environment:
      POSTGRES_USER: krishiai_user
      POSTGRES_PASSWORD: krishiai_password
      POSTGRES_DB: krishiai
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration/V1__Initial_Schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - krishiai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krishiai_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: krishiai-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - krishiai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishiai-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/krishiai
      SPRING_DATASOURCE_USERNAME: krishiai_user
      SPRING_DATASOURCE_PASSWORD: krishiai_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: super_secret_jwt_key_for_docker_change_in_production
      AI_SERVICE_URL: http://ai-service:5000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - krishiai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/logs

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krishiai-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_APP_NAME: KrishiAI
      NEXT_PUBLIC_ENVIRONMENT: docker
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - krishiai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Python AI/ML Service
  ai-service:
    build:
      context: ./ai-models
      dockerfile: Dockerfile
    container_name: krishiai-ai-service
    environment:
      FLASK_ENV: production
      MODEL_PATH: /app/models
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"
    networks:
      - krishiai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./ai-models/models:/app/models

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: krishiai-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - krishiai-network
    restart: unless-stopped

networks:
  krishiai-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
