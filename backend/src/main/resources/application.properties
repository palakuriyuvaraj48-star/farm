# KrishiAI Backend Application Configuration
# Spring Boot Properties

# =====================================================
# SERVER CONFIGURATION
# =====================================================
server.port=8080
server.servlet.context-path=/api/v1
server.shutdown=graceful
server.compression.enabled=true
server.compression.min-response-size=1024

# =====================================================
# DATABASE CONFIGURATION
# =====================================================
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_URL:localhost:5432/krishiai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:krishiai_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# JPA & HIBERNATE
# =====================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# =====================================================
# FLYWAY MIGRATION
# =====================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history
spring.flyway.baseline-on-migrate=true

# =====================================================
# REDIS CONFIGURATION
# =====================================================
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}
spring.redis.timeout=60000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=true

# =====================================================
# CACHING
# =====================================================
spring.cache.cache-names=crops,weather,prices,schemes,farmers

# =====================================================
# JACKSON CONFIGURATION
# =====================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Kolkata

# =====================================================
# SECURITY CONFIGURATION
# =====================================================
spring.security.user.name=admin
spring.security.user.password=admin123

# =====================================================
# JWT CONFIGURATION
# =====================================================
jwt.secret=${JWT_SECRET:default_secret_key_change_in_production}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.root=INFO
logging.level.com.krishiai=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File logging
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =====================================================
# ACTUATOR CONFIGURATION
# =====================================================
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.shutdown.enabled=false
management.metrics.export.prometheus.enabled=true

# =====================================================
# ERROR HANDLING
# =====================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.include-exception=false

# =====================================================
# EXTERNAL API CONFIGURATION
# =====================================================
weather.api.key=${WEATHER_API_KEY:demo}
weather.api.url=https://api.openweathermap.org/data/2.5
market.api.key=${MARKET_DATA_API_KEY:demo}

# =====================================================
# AWS CONFIGURATION
# =====================================================
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.region=${AWS_REGION:ap-south-1}
aws.s3.bucket=${AWS_S3_BUCKET:krishiai-uploads}

# =====================================================
# EMAIL CONFIGURATION
# =====================================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=noreply@krishiai.com

# =====================================================
# AI/ML CONFIGURATION
# =====================================================
ai.service.url=${AI_SERVICE_URL:http://localhost:5000}
ai.service.timeout=60000
ai.model.path=${AI_MODEL_PATH:/models}
ai.max-upload-size=10485760

# =====================================================
# CORS CONFIGURATION
# =====================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.max-age=3600

# =====================================================
# RATE LIMITING
# =====================================================
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=100
app.rate-limit.requests-per-hour=1000

# =====================================================
# APPLICATION CONFIGURATION
# =====================================================
app.name=KrishiAI
app.version=1.0.0
app.environment=${APP_ENVIRONMENT:development}
app.support-languages=EN,HI,TE

# =====================================================
# ASYNC CONFIGURATION
# =====================================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.scheduling.pool.size=5

# =====================================================
# MULTIPART FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=1MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =====================================================
# APPLICATION CONTEXT
# =====================================================
spring.application.name=KrishiAI-Backend
spring.application.version=1.0.0

# =====================================================
# PROFILES
# =====================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}
