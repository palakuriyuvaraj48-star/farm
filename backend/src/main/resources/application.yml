spring:
  application:
    name: krishiai-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/krishiai
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

logging:
  level:
    root: INFO
    com.krishiai: DEBUG
